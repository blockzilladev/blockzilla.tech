<!doctype html>
<html lang="en" data-theme="chain">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Lost in the ledger · Blockzilla</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#05070a">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="ds/tokens.css">
<link rel="stylesheet" href="ds/components.css">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
  /* the 404 code, styled like the hero title */
  .e404 {
    margin: 0; font-family: var(--font-display); font-weight: 700;
    font-size: clamp(72px, 18vw, 200px); line-height: .86; letter-spacing: -.03em;
    color: var(--fg);
    text-shadow: 0 0 46px color-mix(in srgb, var(--accent) 45%, transparent);
  }
  .e404 .t-accent { color: var(--accent); }
</style>
</head>
<body>

<!-- brand mark defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false"><defs>
  <symbol id="ico" viewBox="0 0 100 100">
    <g fill="currentColor" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round">
      <polygon points="12,28 50,6 50,40"  fill-opacity=".55"/>
      <polygon points="50,6 88,28 50,40"  fill-opacity=".82"/>
      <polygon points="88,28 68,58 50,40" fill-opacity=".46"/>
      <polygon points="88,28 88,72 68,58" fill-opacity=".70"/>
      <polygon points="88,72 50,94 68,58" fill-opacity=".50"/>
      <polygon points="50,94 68,58 32,58" fill-opacity=".88"/>
      <polygon points="50,94 32,58 12,72" fill-opacity=".60"/>
      <polygon points="12,72 32,58 12,28" fill-opacity=".40"/>
      <polygon points="12,28 32,58 50,40" fill-opacity=".70"/>
      <polygon points="50,40 32,58 68,58" fill-opacity="1"/>
    </g>
  </symbol>
  <g fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <symbol id="ic-arrow" viewBox="0 0 24 24"><line x1="4" y1="12" x2="19.5" y2="12"/><polyline points="13.5,5.5 20,12 13.5,18.5"/></symbol>
  </g>
</defs></svg>

<!-- WebGL scene (shared hero.js) -->
<canvas id="bg" aria-hidden="true"></canvas>
<div class="scene-scrim" aria-hidden="true"></div>

<header class="nav">
  <a class="logo" href="/" aria-label="Blockzilla home">
    <svg class="mark"><use href="#ico"/></svg>
    <span class="logo__word">BLOCKZILLA</span>
  </a>
</header>

<!-- hero.js targets .hero + #bg; the panel shows the 404 message -->
<section class="hero" id="top">
  <div class="hero__panel">
    <span class="eyebrow">Error &nbsp;·&nbsp; 404 &nbsp;·&nbsp; Not found</span>
    <h1 class="e404">4<span class="t-accent">0</span>4</h1>
    <p class="hero__tag">This block isn't <span class="t-accent">on the chain.</span></p>
    <p class="hero__sub">The page you're looking for drifted off the ledger — or never existed. Let's get you back to a known-good state.</p>
    <div class="hero__cta row">
      <a class="btn btn--primary btn--lg" href="/">Back home <svg class="ic"><use href="#ic-arrow"/></svg></a>
    </div>
  </div>
</section>

<script type="module" src="hero.js"></script>
</body>
</html>
